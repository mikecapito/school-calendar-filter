name: Update Filtered Calendar

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI
  push:
    paths:
      - 'config.json'  # Re-run whenever you change filters

jobs:
  filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run calendar filter
        run: python filter_calendar.py

      - name: Commit and push filtered calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/filtered.ics
          git diff --staged --quiet || git commit -m "Update filtered calendar [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
